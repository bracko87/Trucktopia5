# Netlify config for this repo (build & local dev)
# Created by Sider Web Creator
[build]
  command = "npm run build"
  publish = "dist"

# Local dev server settings (custom framework)
[dev]
  command = "npm run dev"
  port = 3000
  targetPort = 3000
  framework = "#custom"

# If you use Vite, uncomment and adjust:
# [dev]
#   command = "npm run dev"
#   port = 3000
#   targetPort = 5173

# If you use react-scripts, uncomment and adjust:
# [dev]
#   command = "npm start"
#   port = 3000
#   targetPort = 3000
